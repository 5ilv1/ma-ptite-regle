<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma P'tite Règle — Période 5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap');

:root {
  --pink: #F9C4D2;
  --pink-dark: #F4A0B8;
  --red: #E8321A;
  --red-light: #FF5A3C;
  --orange: #F5A623;
  --orange-light: #FFD06B;
  --bg: #FEF0F4;
  --white: #FFFFFF;
  --ink: #1A0A08;
  --ink2: #5a2a1a;
  --ink3: #a07060;
  --border: #F0CEDA;
  --green: #4ECBA0;
  --blue: #4A90D9;
  --gray: #e8dde0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  background: var(--pink);
  border-bottom: 3px solid var(--pink-dark);
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 3px 16px rgba(232,50,26,0.12);
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-logo img {
  height: 56px;
  width: 56px;
  object-fit: contain;
  border-radius: 50%;
}
.header-title {
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: 22px;
  color: var(--red);
  line-height: 1;
  letter-spacing: -0.5px;
}
.header-title small {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.p5-badge {
  background: var(--red);
  color: #fff;
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: 14px;
  padding: 6px 18px;
  border-radius: 30px;
  letter-spacing: 0.5px;
  box-shadow: 0 3px 10px rgba(232,50,26,0.3);
}

/* ── LAYOUT ── */
.app {
  display: grid;
  grid-template-columns: 290px 1fr;
  min-height: calc(100vh - 72px);
}

/* ── SIDEBAR ── */
.sidebar {
  background: var(--white);
  border-right: 3px solid var(--border);
  padding: 20px 16px;
  overflow-y: auto;
}
.sidebar-title {
  font-family: 'Baloo 2', cursive;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 16px;
  padding-left: 4px;
}

.month-block { margin-bottom: 24px; }
.month-label {
  font-family: 'Baloo 2', cursive;
  font-size: 16px;
  font-weight: 800;
  color: var(--red);
  margin-bottom: 10px;
  padding: 4px 10px;
  background: var(--pink);
  border-radius: 10px;
  display: inline-block;
}

/* day header row */
.cal-head {
  display: grid;
  grid-template-columns: 22px repeat(4, 1fr);
  gap: 3px;
  margin-bottom: 4px;
  padding-left: 2px;
}
.cal-head span {
  font-size: 10px;
  font-weight: 700;
  color: var(--ink3);
  text-align: center;
  text-transform: uppercase;
}

.week-row {
  display: grid;
  grid-template-columns: 22px repeat(4, 1fr);
  gap: 3px;
  margin-bottom: 4px;
  align-items: stretch;
}
.week-num {
  font-size: 9px;
  font-weight: 700;
  color: var(--ink3);
  display: flex;
  align-items: center;
  justify-content: center;
}

.day-btn {
  border: 2.5px solid var(--border);
  border-radius: 10px;
  padding: 5px 2px;
  cursor: pointer;
  background: var(--bg);
  transition: all .16s;
  text-align: center;
  min-height: 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  position: relative;
}
.day-btn:hover:not(.disabled):not(.off) {
  border-color: var(--red);
  background: var(--pink);
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(232,50,26,0.15);
}
.day-btn.active {
  background: var(--red);
  border-color: var(--red);
  box-shadow: 0 4px 14px rgba(232,50,26,0.35);
  transform: translateY(-2px);
}
.day-btn.active .day-date,
.day-btn.active .day-label-short { color: #fff; }
.day-btn.off {
  opacity: 0.25;
  cursor: default;
  background: #f5f0f2;
}
.day-btn.disabled {
  opacity: 0.32;
  cursor: default;
  background: repeating-linear-gradient(45deg, #f5f0f2, #f5f0f2 3px, #ece6e8 3px, #ece6e8 6px);
}
.day-btn.disabled::after {
  content: '🎉';
  font-size: 12px;
  position: absolute;
  top: 2px; right: 3px;
}
.day-date {
  font-family: 'Baloo 2', cursive;
  font-size: 16px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1;
}
.day-label-short {
  font-size: 9px;
  font-weight: 700;
  color: var(--ink2);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.day-btn.active .day-label-short { opacity: 0.85; }
.day-type-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--orange);
}
.day-btn.active .day-type-dot { background: rgba(255,255,255,0.7); }

/* ── MAIN CONTENT ── */
.main {
  padding: 28px 36px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ── WELCOME SCREEN ── */
.welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 20px;
  padding: 40px;
}
.welcome img {
  width: 140px;
  height: 140px;
  object-fit: contain;
  animation: bounce 2.4s ease-in-out infinite;
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.welcome h1 {
  font-family: 'Baloo 2', cursive;
  font-size: 32px;
  font-weight: 800;
  color: var(--red);
}
.welcome p {
  font-size: 16px;
  color: var(--ink2);
  max-width: 380px;
  line-height: 1.6;
}
.welcome-arrow {
  font-size: 28px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.15); }
}

/* ── DAY CONTENT ── */
.content-card {
  background: var(--white);
  border-radius: 20px;
  border: 3px solid var(--border);
  padding: 28px 32px;
  box-shadow: 0 4px 20px rgba(232,50,26,0.07);
}

.content-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 16px;
  flex-wrap: wrap;
}
.day-info {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.day-full-label {
  font-family: 'Baloo 2', cursive;
  font-size: 13px;
  font-weight: 700;
  color: var(--ink3);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.day-rule-title {
  font-family: 'Baloo 2', cursive;
  font-size: 28px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1.1;
}
.day-rule-title .highlight {
  color: var(--red);
  background: var(--pink);
  padding: 0 6px;
  border-radius: 6px;
}
.day-type-badge {
  font-family: 'Baloo 2', cursive;
  font-size: 14px;
  font-weight: 800;
  padding: 8px 20px;
  border-radius: 30px;
  white-space: nowrap;
  align-self: flex-start;
}
.badge-lundi { background: var(--orange); color: #fff; box-shadow: 0 3px 10px rgba(245,166,35,0.35); }
.badge-mardi { background: var(--green); color: #fff; box-shadow: 0 3px 10px rgba(78,203,160,0.35); }
.badge-jeudi { background: var(--blue); color: #fff; box-shadow: 0 3px 10px rgba(74,144,217,0.35); }
.badge-vendredi { background: var(--red); color: #fff; box-shadow: 0 3px 10px rgba(232,50,26,0.35); }

/* LUNDI — observation */
.lundi-instruction {
  background: var(--pink);
  border-radius: 14px;
  padding: 14px 20px;
  font-size: 15px;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 20px;
  border-left: 5px solid var(--red);
}
.lundi-instruction strong { color: var(--red); }

.phrases-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.phrase-block {
  background: var(--bg);
  border: 2.5px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: flex-start;
  gap: 14px;
  transition: border-color .15s;
}
.phrase-block:hover { border-color: var(--pink-dark); }
.phrase-num {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--orange);
  color: #fff;
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.phrase-text {
  font-size: 18px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.5;
}
.phrase-text .mot {
  color: var(--red);
  font-weight: 800;
  background: var(--pink);
  padding: 1px 5px;
  border-radius: 5px;
}

/* ENTRAINEMENT — mardi/jeudi */
.exercice-intro {
  background: var(--pink);
  border-radius: 14px;
  padding: 12px 18px;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 18px;
  border-left: 5px solid var(--green);
}
.exercice-intro.jeudi { border-left-color: var(--blue); }

.phrases-container .phrase-block.exercice {
  cursor: pointer;
}
.phrase-text .trou {
  display: inline-block;
  min-width: 70px;
  background: var(--white);
  border: 2.5px solid var(--pink-dark);
  border-radius: 8px;
  padding: 2px 10px;
  margin: 0 4px;
  font-weight: 800;
  color: transparent;
  vertical-align: middle;
  cursor: pointer;
  transition: all .15s;
  font-size: 18px;
  text-align: center;
}
.phrase-text .trou.revealed {
  color: var(--red);
  border-color: var(--red);
  background: var(--pink);
}
.phrase-text .trou:hover:not(.revealed) {
  border-color: var(--orange);
  background: var(--orange-light);
}
.reveal-all-btn {
  background: var(--orange);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 12px 24px;
  font-family: 'Baloo 2', cursive;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  margin-top: 16px;
  transition: all .15s;
  box-shadow: 0 3px 10px rgba(245,166,35,0.3);
}
.reveal-all-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(245,166,35,0.4); }
.reset-btn {
  background: transparent;
  color: var(--ink3);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 10px 20px;
  font-family: 'Baloo 2', cursive;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  margin-top: 16px;
  margin-left: 10px;
  transition: all .15s;
}
.reset-btn:hover { border-color: var(--ink3); }

.btn-row { display: flex; align-items: center; gap: 0; }

/* VENDREDI — trace écrite */
.trace-ecrite {
  background: linear-gradient(135deg, var(--pink) 0%, #FFF0F4 100%);
  border: 3px solid var(--pink-dark);
  border-radius: 18px;
  padding: 24px 28px;
  margin-bottom: 20px;
}
.trace-title {
  font-family: 'Baloo 2', cursive;
  font-size: 20px;
  font-weight: 800;
  color: var(--red);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.trace-rule-box {
  background: var(--white);
  border: 3px solid var(--red);
  border-radius: 14px;
  padding: 16px 20px;
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.6;
  margin-bottom: 14px;
}
.trace-rule-box .rule-key {
  color: var(--red);
  font-weight: 800;
}
.trace-rule-box .rule-example {
  font-size: 14px;
  color: var(--ink2);
  font-weight: 600;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
  font-style: italic;
}
.trace-exercice-title {
  font-family: 'Baloo 2', cursive;
  font-size: 16px;
  font-weight: 700;
  color: var(--ink2);
  margin-bottom: 12px;
  margin-top: 8px;
}

/* NAV BUTTONS */
.nav-row {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}
.nav-btn {
  background: var(--white);
  border: 2.5px solid var(--border);
  border-radius: 14px;
  padding: 10px 20px;
  font-family: 'Baloo 2', cursive;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  color: var(--ink2);
  transition: all .15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-btn:hover:not(:disabled) { border-color: var(--red); color: var(--red); transform: translateY(-1px); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
.nav-btn.primary { background: var(--red); border-color: var(--red); color: #fff; box-shadow: 0 3px 10px rgba(232,50,26,0.25); }
.nav-btn.primary:hover { background: var(--red-light); }

/* LEGEND */
.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  padding: 12px 16px;
  background: var(--white);
  border-radius: 14px;
  border: 2px solid var(--border);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--ink2);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
}

/* FÉRIÉ tag */
.ferie-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--red);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

/* scrollbar */
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--pink-dark); border-radius: 4px; }

/* responsive hint */
@media (max-width: 800px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .main { padding: 16px; }
}
</style>

// Weeks: [semaine_index, {date: "YYYY-MM-DD", type: "lundi"|"mardi"|"jeudi"|"vendredi"|"off"|"ferie"|"vacances"}[]]
// P5 starts Mon 20 April 2026

const JOURS_FERIES = ["2026-05-01","2026-05-08","2026-05-14","2026-05-15","2026-05-25"];
const VACANCES_FIN = ["2026-06-29","2026-06-30","2026-07-01","2026-07-02","2026-07-03","2026-07-04"];

function buildCalendar() {
  // Each week: [lundi, mardi, -, jeudi, vendredi] shown as L M J V
  // Semaine mapping:
  // S1: 20-24 avril  → L M J V  → règle 1
  // S2: 27 avril – 1er mai → L M J (V=férié) → règle 2
  // S3: 4-8 mai → L M J (V=férié) → règle 3
  // S4: 11-15 mai → L M (J=pont V=pont) → règle 4
  // S5: 18-22 mai → L M J V → règle 5
  // S6: 25-29 mai → (L=pentecôte) M J V → règle 6
  // S7: 1-5 juin → L M J V → règle 7
  // S8: 8-12 juin → L M J V → règle 8
  // S9: 15-19 juin → L M J V → règle 9
  // S10-11: 22+ juin → vacances/spectacle

  const semaines_cal = [
    { s: 0, label: "S1", days: [
      { date: "2026-04-20", type: "lundi" },
      { date: "2026-04-21", type: "mardi" },
      { date: "2026-04-23", type: "jeudi" },
      { date: "2026-04-24", type: "vendredi" },
    ]},
    { s: 1, label: "S2", days: [
      { date: "2026-04-27", type: "lundi" },
      { date: "2026-04-28", type: "mardi" },
      { date: "2026-04-30", type: "jeudi" },
      { date: "2026-05-01", type: "ferie", label: "1er mai" },
    ]},
    { s: 2, label: "S3", days: [
      { date: "2026-05-04", type: "lundi" },
      { date: "2026-05-05", type: "mardi" },
      { date: "2026-05-07", type: "jeudi" },
      { date: "2026-05-08", type: "ferie", label: "8 mai" },
    ]},
    { s: 3, label: "S4", days: [
      { date: "2026-05-11", type: "lundi" },
      { date: "2026-05-12", type: "mardi" },
      { date: "2026-05-14", type: "ferie", label: "Ascension" },
      { date: "2026-05-15", type: "ferie", label: "Pont" },
    ]},
    { s: 4, label: "S5", days: [
      { date: "2026-05-18", type: "lundi" },
      { date: "2026-05-19", type: "mardi" },
      { date: "2026-05-21", type: "jeudi" },
      { date: "2026-05-22", type: "vendredi" },
    ]},
    { s: 5, label: "S6", days: [
      { date: "2026-05-25", type: "ferie", label: "Pentecôte" },
      { date: "2026-05-26", type: "mardi" },
      { date: "2026-05-28", type: "jeudi" },
      { date: "2026-05-29", type: "vendredi" },
    ]},
    { s: 6, label: "S7", days: [
      { date: "2026-06-01", type: "lundi" },
      { date: "2026-06-02", type: "mardi" },
      { date: "2026-06-04", type: "jeudi" },
      { date: "2026-06-05", type: "vendredi" },
    ]},
    { s: 7, label: "S8", days: [
      { date: "2026-06-08", type: "lundi" },
      { date: "2026-06-09", type: "mardi" },
      { date: "2026-06-11", type: "jeudi" },
      { date: "2026-06-12", type: "vendredi" },
    ]},
    { s: 8, label: "S9", days: [
      { date: "2026-06-15", type: "lundi" },
      { date: "2026-06-16", type: "mardi" },
      { date: "2026-06-18", type: "jeudi" },
      { date: "2026-06-19", type: "vendredi" },
    ]},
    { s: -1, label: "S10", days: [
      { date: "2026-06-22", type: "disabled" },
      { date: "2026-06-23", type: "disabled" },
      { date: "2026-06-25", type: "disabled" },
      { date: "2026-06-26", type: "disabled" },
    ]},
    { s: -1, label: "S11", days: [
      { date: "2026-06-29", type: "disabled" },
      { date: "2026-06-30", type: "disabled" },
      { date: "2026-07-02", type: "disabled" },
      { date: "2026-07-03", type: "disabled" },
    ]},
  ];

  const months = {
    "2026-04": { label: "Avril 2026", weeks: [] },
    "2026-05": { label: "Mai 2026", weeks: [] },
    "2026-06": { label: "Juin 2026", weeks: [] },
  };

  // Assign weeks to months by first day
  semaines_cal.forEach(w => {
    const firstDate = w.days[0].date;
    const monthKey = firstDate.slice(0,7);
    if (months[monthKey]) months[monthKey].weeks.push(w);
    else {
      // overflow to previous month (shouldn't happen here)
      const keys = Object.keys(months);
      months[keys[keys.length-1]].weeks.push(w);
    }
  });

  const cal = document.getElementById('calendar');
  const dayLabels = ['L','M','J','V'];

  Object.values(months).forEach(month => {
    if (month.weeks.length === 0) return;
    const mb = document.createElement('div');
    mb.className = 'month-block';
    mb.innerHTML = `<div class="month-label">${month.label}</div>`;

    const head = document.createElement('div');
    head.className = 'cal-head';
    head.innerHTML = '<span></span>' + dayLabels.map(l=>`<span>${l}</span>`).join('');
    mb.appendChild(head);

    month.weeks.forEach(week => {
      const wr = document.createElement('div');
      wr.className = 'week-row';

      const wn = document.createElement('div');
      wn.className = 'week-num';
      wn.textContent = week.label;
      wr.appendChild(wn);

      week.days.forEach(day => {
        const btn = document.createElement('button');
        btn.className = 'day-btn';
        const d = new Date(day.date + 'T12:00:00');
        const dayNum = d.getDate();

        if (day.type === 'ferie') {
          btn.classList.add('off');
          btn.innerHTML = `<span class="day-date">${dayNum}</span><span class="ferie-label">${day.label||'férié'}</span>`;
        } else if (day.type === 'disabled') {
          btn.classList.add('disabled');
          btn.innerHTML = `<span class="day-date">${dayNum}</span>`;
        } else {
          btn.classList.add('has-content');
          const dotColor = day.type === 'lundi' ? 'var(--orange)' : day.type === 'mardi' ? 'var(--green)' : day.type === 'jeudi' ? 'var(--blue)' : 'var(--red)';
          btn.innerHTML = `<span class="day-date">${dayNum}</span><div class="day-type-dot" style="background:${dotColor}"></div>`;
          btn.title = `${day.date} — ${day.type}`;
          btn.addEventListener('click', () => {
            document.querySelectorAll('.day-btn.active').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            showDay(week.s, day.type, day.date);
          });
        }
        wr.appendChild(btn);
      });

      mb.appendChild(wr);
    });

    cal.appendChild(mb);
  });
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const mois = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return `${jours[d.getDay()]} ${d.getDate()} ${mois[d.getMonth()]} ${d.getFullYear()}`;
}

function typeBadge(type) {
  const labels = { lundi: 'Découverte', mardi: 'Entraînement', jeudi: 'Entraînement', vendredi: 'Bilan + Trace écrite' };
  return `<span class="day-type-badge badge-${type}">${labels[type] || type}</span>`;
}

function renderPhrases(phrases, interactive, suffix) {
  return phrases.map((p, i) => {
    const num = `<div class="phrase-num">${i+1}</div>`;
    if (!interactive) {
      const text = p.replace(/<mot>(.*?)<\/mot>/g, '<span class="mot">$1</span>');
      return `<div class="phrase-block"><div class="phrase-num">${i+1}</div><div class="phrase-text">${text}</div></div>`;
    }
    // interactive exercise
    let idx = 0;
    const text = p.text.replace(/___/g, () => {
      const ans = p.answers[idx] || '?';
      idx++;
      return `<span class="trou" data-ans="${ans}" onclick="revealTrou(this)">${ans}</span>`;
    });
    return `<div class="phrase-block exercice"><div class="phrase-num">${i+1}</div><div class="phrase-text">${text}</div></div>`;
  }).join('');
}

function showDay(sIdx, type, dateStr) {
  const welcome = document.getElementById('welcome-screen');
  const content = document.getElementById('day-content');
  welcome.style.display = 'none';
  content.style.display = 'flex';
  content.style.flexDirection = 'column';
  content.style.gap = '20px';

  const s = SEMAINES[sIdx];
  if (!s) { content.innerHTML = '<p style="color:var(--ink3);padding:40px;text-align:center;">Semaine de repos — bon courage pour la fin d\'année ! 🎉</p>'; return; }

  const data = s[type];

  let html = `<div class="content-card">
    <div class="content-header">
      <div class="day-info">
        <div class="day-full-label">${formatDate(dateStr)}</div>
        <div class="day-rule-title">Semaine ${s.num} · <span class="highlight">${s.regel}</span></div>
      </div>
      ${typeBadge(type)}
    </div>`;

  if (type === 'lundi') {
    html += `<div class="lundi-instruction">${data.instruction}</div>`;
    html += `<div class="phrases-container">${renderPhrases(data.phrases, false)}</div>`;
  } else if (type === 'mardi') {
    html += `<div class="exercice-intro">${data.intro}</div>`;
    html += `<div class="phrases-container">${renderPhrases(data.phrases, true)}</div>`;
    html += `<div class="btn-row">
      <button class="reveal-all-btn" onclick="revealAll()">Tout révéler 👁</button>
      <button class="reset-btn" onclick="resetAll()">Recommencer ↺</button>
    </div>`;
  } else if (type === 'jeudi') {
    html += `<div class="exercice-intro jeudi">${data.intro}</div>`;
    html += `<div class="phrases-container">${renderPhrases(data.phrases, true)}</div>`;
    html += `<div class="btn-row">
      <button class="reveal-all-btn" onclick="revealAll()">Tout révéler 👁</button>
      <button class="reset-btn" onclick="resetAll()">Recommencer ↺</button>
    </div>`;
  } else if (type === 'vendredi') {
    html += `<div class="trace-ecrite">
      <div class="trace-title">📌 La règle à retenir</div>
      <div class="trace-rule-box">
        ${data.regle}
        <div class="trace-rule-example">Exemple : ${data.exemple}</div>
      </div>
    </div>`;
    html += `<div class="trace-exercice-title">✏️ Exercice bilan</div>`;
    html += `<div class="exercice-intro">Choisis la bonne réponse et clique pour vérifier !</div>`;
    html += `<div class="phrases-container">${renderPhrases(data.phrases, true)}</div>`;
    html += `<div class="btn-row">
      <button class="reveal-all-btn" onclick="revealAll()">Tout révéler 👁</button>
      <button class="reset-btn" onclick="resetAll()">Recommencer ↺</button>
    </div>`;
  }

  html += `</div>`;
  content.innerHTML = html;
  content.scrollTop = 0;
}

function revealTrou(el) {
  el.classList.add('revealed');
}
function revealAll() {
  document.querySelectorAll('.trou').forEach(t => t.classList.add('revealed'));
}
function resetAll() {
  document.querySelectorAll('.trou').forEach(t => t.classList.remove('revealed'));
}

// ── INIT ─────────────────────────────────────────────────────────────────────
buildCalendar();
</script>
</body>
</html>
